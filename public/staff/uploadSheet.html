    <script>
        // Elementos DOM
        const fileUpload = document.getElementById('fileUpload');
        const fileLabel = document.getElementById('fileLabel');
        const uploadBtn = document.getElementById('uploadBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const notificationAlert = document.getElementById('notificationAlert');
        const progressSection = document.getElementById('progressSection');
        const progressBar = document.getElementById('progressBar');
        const progressStatus = document.getElementById('progressStatus');
        const progressPercent = document.getElementById('progressPercent');
        const resultsSection = document.getElementById('resultsSection');
        const resultsDetails = document.getElementById('resultsDetails');
        const uploadAnotherBtn = document.getElementById('uploadAnotherBtn');

        let isUploading = false;
        let abortController = null;

        // Mostrar notificación
        function showNotification(message, type = 'success') {
            notificationAlert.innerHTML = `
            <div class="d-flex align-items-center">
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'} mr-2"></i>
                <span>${message}</span>
                <button type="button" class="close ml-auto" onclick="this.parentElement.parentElement.style.display='none'">
                    <span>&times;</span>
                </button>
            </div>
        `;
            notificationAlert.className = `alert alert-${type} alert-dismissible`;
            notificationAlert.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    notificationAlert.style.display = 'none';
                }, 5000);
            }
        }

        // Actualizar progreso
        function updateProgress(percent, status) {
            progressBar.style.width = `${percent}%`;
            progressPercent.textContent = `${percent}%`;
            progressStatus.textContent = status;
        }

        // Resetear formulario
        function resetForm() {
            fileUpload.value = '';
            fileLabel.innerHTML = '<span class="text-muted">Haz clic para elegir un archivo...</span>';
            uploadBtn.disabled = true;
            progressSection.style.display = 'none';
            resultsSection.style.display = 'none';
            isUploading = false;
        }

        // Subir archivo
        async function uploadFile() {
            const file = fileUpload.files[0];
            if (!file || isUploading) return;

            const dropdown = document.getElementById('clientSelect');
            const clientId = dropdown.value;
            const clientName = dropdown.options[dropdown.selectedIndex]?.dataset?.fullName || "";
            const selectedYear = document.getElementById('yearSelect').value;

            if (!clientId) {
                showNotification('❌ Por favor seleccione un cliente primero.', 'danger');
                return;
            }

            isUploading = true;
            abortController = new AbortController();

            progressSection.style.display = 'block';
            resultsSection.style.display = 'none';
            uploadBtn.disabled = true;
            cancelBtn.style.display = 'inline-block';

            try {
                updateProgress(10, 'Validando archivo...');

                if (file.size > 10 * 1024 * 1024) {
                    throw new Error('El tamaño del archivo debe ser menor a 10MB');
                }

                const validExtensions = ['.csv', '.xlsx', '.xls'];
                const fileName = file.name.toLowerCase();
                if (!validExtensions.some(ext => fileName.endsWith(ext))) {
                    throw new Error('Por favor suba solo archivos CSV o Excel');
                }

                updateProgress(30, 'Subiendo al servidor...');

                const formData = new FormData();
                formData.append('file', file);
                formData.append('year', selectedYear);
                formData.append('clientId', clientId);
                formData.append('clientName', clientName);
                formData.append('staffId', localStorage.getItem('staffId') || '');

                const response = await fetch('/importExcelFile', {
                    method: 'POST',
                    body: formData,
                    signal: abortController.signal
                });

                if (!response.ok) {
                    throw new Error(`Error del servidor: ${response.status}`);
                }

                updateProgress(70, 'Procesando datos...');

                const result = await response.json();

                if (result.success) {
                    updateProgress(100, '¡Importación completa!');

                    setTimeout(() => {
                        showResults(result);
                        showNotification(
                            `✅ ¡Datos importados exitosamente para <strong>${clientName}</strong>!`,
                            'success'
                        );
                    }, 500);

                } else {
                    throw new Error(result.error || 'Importación fallida');
                }

            } catch (error) {
                if (error.name === 'AbortError') {
                    showNotification('Subida cancelada', 'info');
                } else {
                    showNotification(`❌ Error: ${error.message}`, 'danger');
                    console.error('Error de subida:', error);
                }
                resetForm();
            }
        }

        // Mostrar resultados
        function showResults(result) {
            const imported = result.importedRows || 0;
            const failed = result.failedRows || 0;
            const sheetName = result.sheetName || '';
            const clientName = result.clientName || '';

            resultsDetails.innerHTML = `
            <div class="row">
                <div class="col-6">
                    <div class="text-success">
                        <i class="fas fa-check mr-1"></i>
                        <strong>${imported}</strong> filas importadas
                    </div>
                </div>
                ${failed > 0 ? `
                <div class="col-6">
                    <div class="text-warning">
                        <i class="fas fa-exclamation-triangle mr-1"></i>
                        <strong>${failed}</strong> filas fallidas
                    </div>
                </div>
                ` : ''}
            </div>

            ${clientName ? `
            <div class="mt-2">
                <i class="fas fa-user mr-1 text-primary"></i>
                <small><strong>Cliente:</strong> ${clientName}</small>
            </div>
            ` : ''}

            ${sheetName ? `
            <div class="mt-1">
                <i class="fas fa-table mr-1 text-success"></i>
                <small><strong>Hoja:</strong> ${sheetName}</small>
            </div>
            ` : ''}

            ${result.googleSheets?.sheetUrl ? `
            <div class="mt-1">
                <a href="${result.googleSheets.sheetUrl}" target="_blank" class="btn btn-sm btn-outline-success mt-1">
                    <i class="fas fa-external-link-alt mr-1"></i> Abrir Hoja de Google
                </a>
            </div>
            ` : ''}

            ${result.totalAmount ? `
            <div class="mt-1">
                <i class="fas fa-dollar-sign mr-1"></i>
                <small>Total: ${formatCurrency(result.totalAmount)}</small>
            </div>
            ` : ''}
        `;

            progressSection.style.display = 'none';
            resultsSection.style.display = 'block';
        }

        // Formatear moneda
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2
            }).format(amount);
        }

        // Cancelar subida
        function cancelUpload() {
            if (abortController) abortController.abort();
            resetForm();
            showNotification('Subida cancelada', 'info');
        }

        // ── Event Listeners ──────────────────────────────────────────────────
        fileUpload.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                fileLabel.innerHTML = `
                <i class="fas fa-file-excel mr-2 text-success"></i>
                <strong>${file.name}</strong>
                <small class="text-muted ml-2">(${(file.size / 1024).toFixed(2)} KB)</small>
            `;
                uploadBtn.disabled = false;
            } else {
                resetForm();
            }
        });

        uploadBtn.addEventListener('click', uploadFile);
        cancelBtn.addEventListener('click', cancelUpload);
        uploadAnotherBtn.addEventListener('click', resetForm);

        // Arrastrar y soltar
        const cardBody = document.querySelector('.card-body');
        cardBody.addEventListener('dragover', (e) => {
            e.preventDefault();
            cardBody.style.backgroundColor = '#f8f9fa';
        });
        cardBody.addEventListener('dragleave', (e) => {
            e.preventDefault();
            cardBody.style.backgroundColor = '';
        });
        cardBody.addEventListener('drop', (e) => {
            e.preventDefault();
            cardBody.style.backgroundColor = '';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileUpload.files = files;
                fileUpload.dispatchEvent(new Event('change', { bubbles: true }));
            }
        });

        // ── Cerrar sesión ───────────────────────────────────────────────────
        function logout() {
            fetch('/logout', { method: 'POST', credentials: 'include' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        Swal.fire({
                            icon: "success", title: "Sesión cerrada",
                            text: data.message, timer: 1200, showConfirmButton: false
                        });
                        setTimeout(() => { window.location.href = "/login"; }, 1200);
                    } else {
                        Swal.fire("Error", data.message || "Error al cerrar sesión", "error");
                    }
                })
                .catch(() => Swal.fire("Error", "Error del servidor", "error"));
        }

        // ── Menú Móvil ──────────────────────────────────────────────────────
        function initMobileMenu() {
            const menuBtn = document.querySelector(".button-menu-mobile");
            if (menuBtn && !menuBtn.dataset.mobileListenerAttached) {
                menuBtn.dataset.mobileListenerAttached = "true";
                menuBtn.addEventListener("click", function (e) {
                    e.stopPropagation();
                    if (window.innerWidth <= 767) {
                        document.body.classList.toggle("mobile-menu-open");
                    } else {
                        document.body.classList.toggle("enlarge-menu");
                    }
                });
                document.addEventListener("click", function (e) {
                    if (window.innerWidth <= 767) {
                        const sidebar = document.querySelector(".left-sidenav");
                        if (sidebar && !sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
                            document.body.classList.remove("mobile-menu-open");
                        }
                    }
                });
            }
        }

        // ── DOMContentLoaded ─────────────────────────────────────────────────
        document.addEventListener("DOMContentLoaded", async function () {

            initMobileMenu();
            const observer = new MutationObserver(() => {
                const menuBtn = document.querySelector(".button-menu-mobile");
                if (menuBtn && !menuBtn.dataset.mobileListenerAttached) initMobileMenu();
            });
            observer.observe(document.body, { childList: true, subtree: true });

            const staffName = localStorage.getItem("staffName");

            if (!staffName || staffName === "null" || staffName === "undefined") {
                console.log("❌ No staffName en localStorage");
                return;
            }

            console.log("✅ staffName:", staffName);

            try {
                const response = await fetch(`/AssignedClients/${encodeURIComponent(staffName)}`);
                const result = await response.json();

                console.log("✅ Resultado API:", result);

                const dropdown = document.getElementById("clientSelect");
                dropdown.innerHTML = `<option value="">Seleccionar Cliente</option>`;

                dropdown.addEventListener("change", function () {
                    const selectedOption = dropdown.options[dropdown.selectedIndex];
                    if (dropdown.value) {
                        localStorage.setItem("clientId", dropdown.value);
                        localStorage.setItem("clientName", selectedOption.dataset.fullName || selectedOption.textContent);
                    } else {
                        localStorage.removeItem("clientId");
                        localStorage.removeItem("clientName");
                    }
                });

                if (result.success && result.data.length > 0) {
                    result.data.forEach(client => {
                        const option = document.createElement("option");
                        option.value = client.clientId;
                        option.textContent = client.fullName;
                        option.dataset.fullName = client.fullName;
                        dropdown.appendChild(option);
                    });
                    console.log("✅ Clientes cargados:", result.data.length);
                } else {
                    console.log("⚠️ Sin clientes para staffName:", staffName);
                }

            } catch (error) {
                console.error("❌ Error al cargar clientes:", error);
            }
        });

        console.log("Formulario de subida inicializado");
    </script>

</body>

</html>
