<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/users/manifest.json">
  <meta name="theme-color" content="#007bff">
  <link rel="stylesheet" href="/users/styles.css">
  <title>Inicio de Sesión - App Web Cliente</title>
</head>
<body>
  <div class="container">
    <!-- Imagen Izquierda -->
    <div class="left-image">
      <img src="/users/image.webp" alt="Imagen Izquierda">
    </div>

    <!-- Tarjeta de Inicio de Sesión Derecha -->
    <div class="right-card">
      <div class="login-card">
        <h2>Inicio de Sesión</h2>
        <form>
          <input type="text" placeholder="Usuario">
          <input type="password" placeholder="Contraseña">
          <div class="remember">
            <input type="checkbox" id="remember">
            <label for="remember">¡Recordar mi contraseña para la próxima vez!</label>
          </div>
          <button type="submit">Acceder</button>
        </form>

        <p class="webmail-choice">
          Elige el webmail con el que deseas iniciar sesión:
          <label><input type="radio" name="mail" checked> Avanzado</label>
          <label><input type="radio" name="mail"> Roundcube</label>
        </p>

        <a href="#" class="lost-password">¡Ups! He olvidado mi contraseña</a>

        <!-- Botón de Instalación PWA -->
        <!-- <button id="installBtn" class="install-btn" style="display:none;">
          Instalar App
        </button> -->
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/users/main.js"></script>
</body>
</html>
