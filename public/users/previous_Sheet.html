<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page_title">Resultados de la Hoja de Google</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="/users/styles.css">
</head>

<body>
  <div class="app-shell">

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Left Nav Sidebar -->
    <div id="app"></div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">

      <!-- Top Bar -->
      <div class="top-bar">
        <button class="hamburger-btn" onclick="toggleSidebar()" data-i18n-title="toggle_sidebar" title="Alternar barra lateral">
          <i class="bi bi-list"></i>
        </button>

        <a href="/LiveSheetData">
          <img src="/users/icons/image1.png" alt="logotipo" data-i18n-alt="logo_alt" class="theme-logo top-bar-logo"
            onerror="this.style.display='none'">
        </a>

        <span class="top-bar-title" data-i18n="top_bar_title"></span>

        <!-- Language Button ONLY — modal neeche body level pe hai -->
        <button class="lang-btn" id="langBtn" onclick="openLangModal()" aria-haspopup="dialog">
          <span class="lang-flag" id="activeFlag" data-i18n="select_languages">Select languages</span>
        </button>

        <button class="theme-toggle-btn" onclick="toggleTheme()" data-i18n-title="theme_toggle" title="Cambiar tema">
          <span class="icon-dark">🌙</span>
          <span class="icon-light">☀️</span>
        </button>

        <span class="badge-status">
          <i class="bi bi-circle-fill" style="font-size:8px;color:#28a745;"></i>
          <span class="live-text" data-i18n="live_data"> Datos en vivo</span>
        </span>
      </div>

      <!-- ✅ Modal body ke end mein, top-bar ke BAHAR -->
         <div class="lang-modal-overlay" id="langModalOverlay">
        <div class="lang-modal-box" onclick="event.stopPropagation()">
          <div class="lang-modal-header">
            <span class="lang-modal-title" data-i18n="select_language">Select Language</span>
            <button class="lang-modal-close" onclick="closeLangModal()" data-i18n-title="close" title="Close">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
          <div class="lang-modal-list" id="langList"></div>
          <div class="lang-modal-footer">
            <button class="lang-modal-btn-cancel" onclick="closeLangModal()" data-i18n="cancel">Cancel</button>
            <button class="lang-modal-btn-apply" onclick="applyLangModal()" data-i18n="apply">Apply</button>
          </div>
        </div>
      </div>

      <!-- Filter Open Button + Active Pills -->
      <div style="display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;">

        <button class="btn-open-filter" onclick="openFilterDrawer()">
          <i class="bi bi-sliders2"></i>
          <span data-i18n="filters">Filtros</span>
          <span class="filter-badge" id="filterBadge" style="display:none;">0</span>
        </button>

        <button onclick="openChatDrawer()" class="ai-chat-btn">
          <i class="bi bi-robot" style="font-size:14px;"></i>
          <span class="btn-text" data-i18n="ai_chat">Chat IA</span>
        </button>

        <div class="active-filter-pills" id="activePills"></div>

      </div>

      <!-- FILTER DRAWER -->
      <div class="filter-drawer-overlay" id="filterDrawerOverlay" onclick="closeFilterDrawer()"></div>

      <div class="filter-drawer" id="filterDrawer">
        <div class="fd-header">
          <div class="fd-header-title"><i class="bi bi-sliders2" style="font-size:18px;"></i> <span data-i18n="filters_and_summary">Filtros y Resumen</span></div>
          <button class="fd-close-btn" onclick="closeFilterDrawer()" data-i18n-title="close" title="Close"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="fd-body">

          <!-- Period Filter -->
          <div class="fd-section">
            <div class="fd-section-title"><i class="bi bi-calendar3"></i> <span data-i18n="period_filter">Filtro de período</span></div>

            <div class="filter-toggle-group">
              <button class="toggle-btn active" id="btnMonth" onclick="setFilterType('month')" data-i18n="month">Mes</button>
              <button class="toggle-btn" id="btnYear" onclick="setFilterType('year')" data-i18n="year">Año</button>
              <button class="toggle-btn" id="btnMonthYear" onclick="setFilterType('monthyear')" data-i18n="month_vs_year_short">M vs A</button>
            </div>

            <!-- Month-only -->
            <div id="monthFilters">
              <div class="fd-row">
                <label class="fd-label" data-i18n="month_1">Mes 1</label>
                <select class="fd-select" id="selMonth1" onchange="onFilterChange()">
                  <option value="" data-i18n="select_placeholder">-- Seleccionar --</option>
                </select>
              </div>
              <div class="fd-row">
                <label class="fd-label" data-i18n="compare_with">Comparar con</label>
                <select class="fd-select" id="selMonth2" onchange="onFilterChange()">
                  <option value="" data-i18n="none_placeholder">-- Ninguno --</option>
                </select>
              </div>
            </div>

            <!-- Year-only -->
            <div id="yearFilters" style="display:none;">
              <div class="fd-row">
                <label class="fd-label" data-i18n="year_1">Año 1</label>
                <select class="fd-select" id="selYear1" onchange="onFilterChange()">
                  <option value="" data-i18n="select_placeholder">-- Seleccionar --</option>
                </select>
              </div>
              <div class="fd-row">
                <label class="fd-label" data-i18n="compare_with">Comparar con</label>
                <select class="fd-select" id="selYear2" onchange="onFilterChange()">
                  <option value="" data-i18n="none_placeholder">-- Ninguno --</option>
                </select>
              </div>
            </div>

            <!-- Month vs Year -->
            <div id="monthYearFilters" style="display:none;">
              <div class="fd-row">
                <label class="fd-label" data-i18n="month">Mes</label>
                <select class="fd-select" id="selMY_month" onchange="onFilterChange()">
                  <option value="" data-i18n="select_month_placeholder">-- Seleccionar mes --</option>
                </select>
              </div>
              <div class="fd-row">
                <label class="fd-label" data-i18n="compare_with_year">Comparar con año</label>
                <select class="fd-select" id="selMY_year" onchange="onFilterChange()">
                  <option value="" data-i18n="select_year_placeholder">-- Seleccionar año --</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Period Summary -->
          <div id="drawerSummarySection" style="display:none;">
            <div id="drawerSummaryContent"></div>
          </div>

          <!-- Code Filter -->
          <div class="fd-section purple-section" id="codeFilterSection" style="display:none;">
            <div class="fd-section-title"><i class="bi bi-hash"></i> <span data-i18n="code_summary">Resumen de código</span></div>

            <div class="fd-row">
              <label class="fd-label" data-i18n="sheet_code">Código de Hoja de Google</label>
              <select class="fd-select purple" id="codeSelect" onchange="onCodeSelect()">
                <option value="" data-i18n="select_code_placeholder">-- Seleccionar código --</option>
              </select>
            </div>

            <div id="codePeriodRow" style="display:none;">

              <div class="filter-toggle-group" style="margin-bottom:8px;">
                <button class="toggle-btn active" id="codeBtnMonth" onclick="setCodePeriodType('month')" data-i18n="month">Mes</button>
                <button class="toggle-btn" id="codeBtnYear" onclick="setCodePeriodType('year')" data-i18n="year">Año</button>
                <button class="toggle-btn" id="codeBtnMonthYear" onclick="setCodePeriodType('monthyear')" data-i18n="month_vs_year_short">M vs
                  A</button>
              </div>

              <div id="codeMonthFilters">
                <div class="fd-row">
                  <label class="fd-label" data-i18n="month_1">Mes 1</label>
                  <select class="fd-select purple" id="codeSelMonth1" onchange="onCodePeriodChange()">
                    <option value="" data-i18n="select_placeholder">-- Seleccionar --</option>
                  </select>
                </div>
                <div class="fd-row">
                  <label class="fd-label" data-i18n="compare_with">Comparar con</label>
                  <select class="fd-select purple" id="codeSelMonth2" onchange="onCodePeriodChange()">
                    <option value="" data-i18n="none_placeholder">-- Ninguno --</option>
                  </select>
                </div>
              </div>

              <div id="codeYearFilters" style="display:none;">
                <div class="fd-row">
                  <label class="fd-label" data-i18n="year_1">Año 1</label>
                  <select class="fd-select purple" id="codeSelYear1" onchange="onCodePeriodChange()">
                    <option value="" data-i18n="select_placeholder">-- Seleccionar --</option>
                  </select>
                </div>
                <div class="fd-row">
                  <label class="fd-label" data-i18n="compare_with">Comparar con</label>
                  <select class="fd-select purple" id="codeSelYear2" onchange="onCodePeriodChange()">
                    <option value="" data-i18n="none_placeholder">-- Ninguno --</option>
                  </select>
                </div>
              </div>

              <div id="codeMonthYearFilters" style="display:none;">
                <div class="fd-row">
                  <label class="fd-label" data-i18n="month">Mes</label>
                  <select class="fd-select purple" id="codeSelMY_month" onchange="onCodePeriodChange()">
                    <option value="" data-i18n="select_month_placeholder">-- Seleccionar mes --</option>
                  </select>
                </div>
                <div class="fd-row">
                  <label class="fd-label" data-i18n="compare_with_year">Comparar con año</label>
                  <select class="fd-select purple" id="codeSelMY_year" onchange="onCodePeriodChange()">
                    <option value="" data-i18n="select_year_placeholder">-- Seleccionar año --</option>
                  </select>
                </div>
              </div>

            </div>

            <div id="drawerCodeSummary" style="display:none;"></div>
          </div>

        </div>

        <div class="fd-footer">
          <button class="fd-btn-reset" onclick="resetAllFilters()"><i class="bi bi-x-circle"></i> <span data-i18n="reset_all">Restablecer
            todo</span></button>
          <button class="fd-btn-apply" onclick="closeFilterDrawer()"><i class="bi bi-check2-circle"></i> <span data-i18n="done">Listo</span></button>
        </div>
      </div>

      <!-- Card Box -->
      <div class="card-box">

        <!-- Skeleton Loader -->
        <div id="loader" class="loader-wrapper">

          <!-- Top Bar skeleton -->
          <div class="skel-topbar">
            <div class="skeleton-base skeleton-circle" style="width:32px;height:32px;flex-shrink:0;"></div>
            <div class="skeleton-base" style="width:90px;height:18px;"></div>
            <div class="skeleton-base skeleton-pill" style="width:70px;height:18px;margin-left:auto;"></div>
            <div class="skeleton-base" style="width:110px;height:32px;border-radius:8px;"></div>
            <div class="skeleton-base" style="width:110px;height:32px;border-radius:8px;"></div>
            <div class="skeleton-base skeleton-circle" style="width:34px;height:34px;"></div>
          </div>

          <!-- Table Head skeleton -->
          <div class="skel-thead">
            <div class="skeleton-base skel-cell" style="height:16px;"></div>
            <div class="skeleton-base skel-cell" style="height:16px;"></div>
            <div class="skeleton-base skel-cell" style="height:16px;"></div>
            <div class="skeleton-base skel-cell" style="height:16px;"></div>
            <div class="skeleton-base skel-cell" style="height:16px;"></div>
            <div class="skeleton-base skel-cell" style="height:16px;"></div>
          </div>

          <!-- Table Rows skeleton -->
          <div class="skel-row">
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
          </div>
          <div class="skel-row">
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
          </div>
          <div class="skel-row">
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
          </div>
          <div class="skel-row">
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
          </div>
          <div class="skel-row">
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
          </div>
          <div class="skel-row">
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
          </div>
          <div class="skel-row">
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
          </div>
          <div class="skel-row">
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
            <div class="skeleton-base skel-cell"></div>
          </div>

          <!-- Pagination skeleton -->
          <div class="skel-pagination">
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="skeleton-base" style="width:70px;height:28px;border-radius:7px;"></div>
              <div class="skeleton-base" style="width:130px;height:14px;"></div>
            </div>
            <div style="display:flex;gap:6px;">
              <div class="skeleton-base" style="width:32px;height:32px;border-radius:7px;"></div>
              <div class="skeleton-base" style="width:32px;height:32px;border-radius:7px;"></div>
              <div class="skeleton-base" style="width:32px;height:32px;border-radius:7px;"></div>
              <div class="skeleton-base" style="width:32px;height:32px;border-radius:7px;"></div>
              <div class="skeleton-base" style="width:32px;height:32px;border-radius:7px;"></div>
            </div>
          </div>

        </div>

        <!-- Table -->
        <div class="table-responsive" style="position: relative;">
          <table class="table table-bordered table-hover align-middle" id="sheetTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>

          <!-- Prev / Next column buttons -->
          <div class="col-nav-btns" id="colNavBtns" style="display:none;">
            <button class="col-nav-btn" id="btnPrevCol" onclick="shiftColumns(-1)"
              data-i18n-title="previous_columns" title="Columnas anteriores">&#8249;</button>
            <button class="col-nav-btn" id="btnNextCol" onclick="shiftColumns(1)"
              data-i18n-title="next_columns" title="Columnas siguientes">&#8250;</button>
          </div>

          <!-- Fullscreen button -->
          <button id="btnFullscreen" onclick="openFullscreenTable()" data-i18n-title="view_all_columns_fullscreen" title="Ver todas las columnas en pantalla completa"
            style="display:none;">
            &#x26F6;
          </button>
        </div>

        <!-- Pagination bar -->
        <div class="pagination-bar" id="paginationBar" style="display:none;">
          <div style="display:flex;align-items:center;gap:8px;">
            <select class="rows-select" id="rowsPerPage" onchange="changeRowsPerPage()">
              <option value="10">10</option>
              <option value="25" selected>25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
            <span class="pagination-info" id="paginationInfo"></span>
          </div>
          <div class="pagination-controls" id="paginationControls"></div>
        </div>

      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
   FULLSCREEN OVERLAY
═══════════════════════════════════════════════ -->
  <div id="fullscreenOverlay">
    <div id="fsContainer">

      <!-- Header -->
      <div id="fsHeader">
        <div id="fsHeaderTitle">
          <i class="bi bi-fullscreen" style="font-size:16px;"></i>
          <span data-i18n="all_columns_view">Vista de todas las columnas</span>
          <span style="
            background:rgba(255,255,255,0.2);
            font-size:11px;font-weight:600;
            padding:2px 10px;border-radius:20px;
            margin-left:4px;" id="fsColCount"></span>
        </div>
        <button id="fsCloseBtn" onclick="closeFullscreenTable()" data-i18n-title="close_esc" title="Cerrar (Esc)">&#x2715;</button>
      </div>

      <!-- Table wrapper -->
      <div id="fsTableWrapper">
        <table id="fullscreenTable">
          <thead id="fsTableHead"></thead>
          <tbody id="fsTableBody"></tbody>
        </table>
      </div>

      <!-- Footer -->
      <div id="fsFooter">
        <span id="fsRowCount"></span>
        &nbsp;|&nbsp; <span data-i18n="scroll_horizontally_hint">Desplázate horizontalmente para navegar por todas las columnas</span> &nbsp;|&nbsp;
        <span data-i18n="press_to_close_pre"><span data-i18n-pre="press">Presiona</span> <strong>Esc</strong> <span data-i18n-pre="to_close">para cerrar</span></span>
      </div>

    </div>
  </div>

  <!-- Chat Overlay -->
  <div class="chat-drawer-overlay" id="chatDrawerOverlay" onclick="closeChatDrawer()"></div>

  <!-- Chat Drawer -->
  <div class="chat-drawer" id="chatDrawer">
    <div class="cd-header">
      <div class="cd-avatar">🤖</div>
      <div class="cd-header-info">
        <p class="cd-title" data-i18n="ai_sheet_assistant">Asistente IA de Hoja</p>
      </div>
      <div class="cd-header-actions">
        <button class="cd-icon-btn" onclick="clearChat()" data-i18n-title="clear_chat" title="Borrar chat">🗑</button>
        <button class="cd-icon-btn" onclick="closeChatDrawer()" data-i18n-title="close" title="Cerrar">✕</button>
      </div>
    </div>
    <div class="cd-messages" id="cdMessages"></div>

    <div class="cd-input-area">
      <div class="cd-input-row">
        <textarea class="cd-textarea" id="cdInput" data-i18n-placeholder="chat_input_placeholder" placeholder="Por favor ingrese el mensaje..." rows="1"
          onkeydown="handleChatKey(event)" oninput="autoResizeCdTextarea(this)"></textarea>
        <button class="cd-send-btn" id="cdSendBtn" onclick="sendChatMessage()">➤</button>
      </div>
    </div>
  </div>

  <button class="floating-chat-btn" onclick="openChatDrawer()" data-i18n-title="ai_chat" title="Chat IA">
    <i class="bi bi-robot"></i>
    <span class="fc-badge"></span>
  </button>

</body>

<script src="/users/previous_sheet.js"></script>
<script src="/users/sidebar.js"></script>
<script src="/users/languageTranslater.js"></script>

</html>
