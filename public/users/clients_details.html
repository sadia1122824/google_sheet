<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Sheet Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { background: linear-gradient(135deg, #eef2f7, #f8fafc); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }

    /* ── Layout Shell ── */
    .app-shell { display: flex; min-height: 100vh; position: relative; }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #fff;
      border-right: 1px solid #d0e0ff;
      display: flex;
      flex-direction: column;
      transition: transform 0.28s cubic-bezier(.4,0,.2,1), width 0.28s;
      z-index: 100;
      position: relative;
    }
    .sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; transform: translateX(-100%); }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 10px;
      border-bottom: 1px solid #e8f0ff;
    }
    .sidebar-title { font-size: 14px; font-weight: 700; color: #0d6efd; letter-spacing: 0.3px; }

    .sidebar-close-btn {
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: #6c757d; padding: 2px 6px; border-radius: 6px;
      transition: background 0.15s;
    }
    .sidebar-close-btn:hover { background: #f1f5ff; color: #0d6efd; }

    .sidebar-body { flex: 1; padding: 14px 14px 20px; overflow-y: auto; }

    .sidebar-section-title {
      font-size: 11px; font-weight: 700; color: #6c757d;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin: 0 0 10px; display: flex; align-items: center; gap: 6px;
    }

    .sb-filter-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .sb-filter-group label { font-size: 11px; font-weight: 600; color: #6c757d; text-transform: uppercase; letter-spacing: 0.4px; }
    .sb-filter-group select {
      font-size: 13px; padding: 7px 10px; border-radius: 8px;
      border: 1px solid #b0c8ff; background: #fff; color: #2c3e50;
      cursor: pointer; outline: none; transition: border 0.15s; width: 100%;
    }
    .sb-filter-group select:focus { border-color: #0d6efd; }

    .sidebar-divider { border: none; border-top: 1px solid #e8f0ff; margin: 16px 0; }

    /* Sidebar nav links */
    .sb-nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 8px; color: #2c3e50;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s; text-decoration: none;
      margin-bottom: 2px;
    }
    .sb-nav-link:hover { background: #e7f1ff; color: #0d6efd; }
    .sb-nav-link.active { background: #e7f1ff; color: #0d6efd; font-weight: 700; }
    .sb-nav-link i { font-size: 15px; }

    /* ── Overlay (mobile) ── */
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 99;
      transition: opacity 0.25s;
    }
    .sidebar-overlay.show { display: block; }

    /* ── Main Content ── */
    .main-content { flex: 1; min-width: 0; padding: 16px; transition: all 0.28s; }

    /* ── Top Bar ── */
    .top-bar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
      background: #fff; border-radius: 12px;
      padding: 10px 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .hamburger-btn {
      background: none; border: none; cursor: pointer;
      font-size: 22px; color: #2c3e50; padding: 4px 6px;
      border-radius: 8px; transition: background 0.15s; line-height: 1;
    }
    .hamburger-btn:hover { background: #e7f1ff; color: #0d6efd; }
    .top-bar-logo { height: 25px; max-height: 40px; object-fit: contain; }
    .top-bar-title { font-size: 16px; font-weight: 700; color: #2c3e50; flex: 1; }
    .badge-status { background: #e7f1ff; color: #0d6efd; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }

    /* ── Inline Filter Bar (below top bar, above table) ── */
    .filter-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      border: 1px solid #e0ecff;
    }
    .filter-bar-label {
      font-size: 12px; font-weight: 700; color: #0d6efd;
      text-transform: uppercase; letter-spacing: 0.4px;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .filter-toggle-group {
      display: flex; gap: 4px;
    }
    .toggle-btn {
      padding: 6px 14px; border-radius: 8px; border: 1px solid #b0c8ff;
      background: #fff; color: #6c757d; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .toggle-btn.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    .filter-select {
      font-size: 13px; padding: 6px 10px; border-radius: 8px;
      border: 1px solid #b0c8ff; background: #fff; color: #2c3e50;
      cursor: pointer; outline: none; transition: border 0.15s; min-width: 130px;
    }
    .filter-select:focus { border-color: #0d6efd; }
    .filter-select-label {
      font-size: 12px; color: #6c757d; font-weight: 600;
      white-space: nowrap;
    }
    .btn-reset-filter {
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid #b0c8ff; background: #f8faff; color: #6c757d;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-reset-filter:hover { background: #e7f1ff; color: #0d6efd; }

    /* ── Card Box ── */
    .card-box { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; }
    .logo { height: 25px; max-height: 40px; object-fit: contain; }
    h4 { font-weight: 600; color: #2c3e50; }
    .table-responsive { max-height: 65vh; overflow-y: auto; }
    table { border-radius: 10px; overflow: hidden; }
    thead th { position: sticky; top: 0; background: linear-gradient(135deg, #0d6efd, #0b5ed7); color: #fff; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; z-index: 2; text-align: center; }
    tbody tr:nth-child(even) { background: #f9fbfd; }
    tbody tr { transition: all 0.2s ease; }
    tbody tr:hover { background: #e7f1ff; transform: scale(1.002); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    td, th { padding: 10px !important; font-size: 13px; white-space: nowrap; text-align: center; }
    .loader-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; border-radius: 15px; z-index: 10; }
    .loader { text-align: center; }
    .spinner-border { width: 3rem; height: 3rem; }
    .loader-text { margin-top: 10px; font-size: 14px; color: #555; }
    .pagination-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 14px; padding: 10px 14px; background: #f1f5ff; border-radius: 10px; border: 1px solid #d0e0ff; }
    .pagination-info { font-size: 12px; color: #555; }
    .pagination-controls { display: flex; align-items: center; gap: 4px; }
    .page-btn { min-width: 32px; height: 32px; padding: 0 8px; border-radius: 7px; border: 1px solid #b0c8ff; background: #fff; color: #0d6efd; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .page-btn:hover { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    .page-btn.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .rows-select { font-size: 12px; padding: 4px 8px; border-radius: 7px; border: 1px solid #b0c8ff; background: #fff; color: #2c3e50; cursor: pointer; }
    tbody tr.info-row td { font-weight: 600; background: #f1f5ff; text-align: left; color: #2c3e50; font-size: 14px; }
    tbody tr.info-row:nth-child(1) td { font-size: 16px; color: #0d6efd; }
    tbody tr.header-row th { background: linear-gradient(135deg, #0d6efd, #0b5ed7); color: #fff; }

    /* Summary */
    .summary-section { margin-bottom: 18px; display: none; }
    .summary-section.show { display: block; }
    .summary-label { font-size: 12px; font-weight: 600; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
    .summary-card { border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
    .summary-card.income  { background: #e8f5e9; border: 1px solid #a5d6a7; }
    .summary-card.expense { background: #fce4ec; border: 1px solid #f48fb1; }
    .summary-card.profit  { background: #e3f2fd; border: 1px solid #90caf9; }
    .summary-card.loss    { background: #fff3e0; border: 1px solid #ffcc80; }
    .card-icon { font-size: 18px; }
    .card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: #546e7a; }
    .card-value { font-size: 20px; font-weight: 700; color: #1a237e; letter-spacing: -0.3px; }
    .card-sub { font-size: 11px; color: #78909c; }
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .compare-col-title { font-size: 12px; font-weight: 700; color: #0d6efd; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid #b0c8ff; }
    .diff-card { border-radius: 12px; padding: 14px; background: #f1f5ff; border: 1px solid #d0e0ff; margin-top: 12px; }
    .diff-title { font-size: 12px; font-weight: 700; color: #2c3e50; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
    .diff-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 4px 0; border-bottom: 1px solid #e0eaff; }
    .diff-row:last-child { border-bottom: none; }
    .diff-label { color: #546e7a; font-weight: 500; }
    .diff-val { font-weight: 700; }
    .diff-val.up { color: #2e7d32; } .diff-val.down { color: #c62828; } .diff-val.neutral { color: #1565c0; }
    .formula-hint { font-size: 11px; color: #78909c; margin-top: 6px; padding: 6px 10px; background: #f8faff; border-radius: 6px; border-left: 3px solid #0d6efd; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0; left: 0;
        height: 100vh;
        transform: translateX(-100%);
        width: 220px !important;
        min-width: 220px !important;
        box-shadow: 4px 0 24px rgba(0,0,0,0.12);
      }
      .sidebar.open { transform: translateX(0); }
      .main-content { padding: 10px; }
      .table-responsive { max-height: 60vh; }
      .compare-grid { grid-template-columns: 1fr; }
      .filter-bar { gap: 8px; }
    }

    @media (min-width: 769px) {
      .sidebar { transform: none; }
      .sidebar.collapsed { width: 0 !important; min-width: 0 !important; }
    }
  </style>
</head>

<body>

<div class="app-shell">

  <!-- Overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- ── Sidebar ── -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title"><i class="bi bi-grid-1x2-fill"></i> &nbsp;Panel</span>
      <button class="sidebar-close-btn" onclick="closeSidebar()" title="Close sidebar">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="sidebar-body">

      <!-- Nav Links -->
      <div class="sidebar-section-title"><i class="bi bi-compass"></i> Navigation</div>
      <a class="sb-nav-link active" href="#"><i class="bi bi-table"></i> Sheet Data</a>
      <a class="sb-nav-link" href="#"><i class="bi bi-bar-chart-line"></i> Analytics</a>
      <a class="sb-nav-link" href="#"><i class="bi bi-clock-history"></i> History</a>
      <a class="sb-nav-link" href="#"><i class="bi bi-gear"></i> Settings</a>



    </div>
  </div>
  <!-- ── End Sidebar ── -->

  <!-- ── Main Content ── -->
  <div class="main-content" id="mainContent">

    <!-- Top Bar -->
    <div class="top-bar">
      <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebar()" title="Toggle sidebar">
        <i class="bi bi-list"></i>
      </button>
      <a href="/webLogin">
        <img src="/users/icons/image1.png" alt="logo" class="top-bar-logo"
             onerror="this.style.display='none'">
      </a>
      <span class="top-bar-title"></span>
      <span class="badge-status"><i class="bi bi-circle-fill" style="font-size:8px;color:#28a745;"></i> Live Data</span>
    </div>

    <!-- ── Inline Filter Bar ── -->
    <div class="filter-bar" id="filterBar">
      <span class="filter-bar-label"><i class="bi bi-funnel-fill"></i> Filters</span>

      <!-- Month / Year toggle -->
      <div class="filter-toggle-group">
        <button class="toggle-btn active" id="btnMonth" onclick="setFilterType('month')">Month</button>
        <button class="toggle-btn" id="btnYear" onclick="setFilterType('year')">Year</button>
      </div>

      <!-- Month selects -->
      <div id="monthFilters" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span class="filter-select-label">Month 1</span>
        <select class="filter-select" id="selMonth1" onchange="onFilterChange()"><option value="">-- Select --</option></select>
        <span class="filter-select-label">Compare</span>
        <select class="filter-select" id="selMonth2" onchange="onFilterChange()"><option value="">-- None --</option></select>
      </div>

      <!-- Year selects -->
      <div id="yearFilters" style="display:none;align-items:center;gap:8px;flex-wrap:wrap;">
        <span class="filter-select-label">Year 1</span>
        <select class="filter-select" id="selYear1" onchange="onFilterChange()"><option value="">-- Select --</option></select>
        <span class="filter-select-label">Compare</span>
        <select class="filter-select" id="selYear2" onchange="onFilterChange()"><option value="">-- None --</option></select>
      </div>

      <button class="btn-reset-filter" onclick="resetFilters()">
        <i class="bi bi-x-circle"></i> Reset
      </button>
    </div>
    <!-- ── End Filter Bar ── -->

    <!-- Card -->
    <div class="card-box">

      <div id="loader" class="loader-wrapper">
        <div class="loader">
          <div class="spinner-border text-primary" role="status"></div>
          <div class="loader-text"></div>
        </div>
      </div>

      <div class="summary-section" id="summarySection">
        <div id="summaryContent"></div>
      </div>

      <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle" id="sheetTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="pagination-bar" id="paginationBar" style="display:none;">
        <div style="display:flex;align-items:center;gap:8px;">
          <label style="font-size:12px;color:#555;font-weight:600;white-space:nowrap;">Rows per page:</label>
          <select class="rows-select" id="rowsPerPage" onchange="changeRowsPerPage()">
            <option value="10">10</option>
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
          <span class="pagination-info" id="paginationInfo"></span>
        </div>
        <div class="pagination-controls" id="paginationControls"></div>
      </div>

    </div>

  </div>
  <!-- ── End Main Content ── -->

</div><!-- end app-shell -->

<script>
  let allDataRows   = [];
  let headers       = [];
  let infoRows      = [];
  let currentPage   = 1;
  let rowsPerPage   = 25;
  let filterType    = 'month';
  let monthCols     = [];
  let yearCols      = [];
  let pctColIndices = new Set();
  let sidebarOpen   = true;

  const isMobile = () => window.innerWidth <= 768;

  function toggleSidebar() {
    if (isMobile()) {
      const sb = document.getElementById('sidebar');
      const ov = document.getElementById('sidebarOverlay');
      sb.classList.toggle('open');
      ov.classList.toggle('show');
    } else {
      sidebarOpen = !sidebarOpen;
      document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
    }
  }

  function closeSidebar() {
    if (isMobile()) {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('show');
    } else {
      sidebarOpen = false;
      document.getElementById('sidebar').classList.add('collapsed');
    }
  }

  window.addEventListener('resize', () => {
    if (isMobile()) {
      document.getElementById('sidebar').classList.remove('collapsed');
    } else {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('show');
      if (sidebarOpen) document.getElementById('sidebar').classList.remove('collapsed');
    }
  });

  const MONTHS_EN    = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  const MONTHS_AB    = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const MONTHS_ES    = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const MONTHS_AB_ES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  function isMonth(s) {
    const lc = s.toLowerCase().trim();
    return MONTHS_EN.includes(lc) || MONTHS_AB.includes(lc) || MONTHS_ES.includes(lc) || MONTHS_AB_ES.includes(lc);
  }
  function isYear(s) {
    return /^\d{4}$/.test(s.trim()) && parseInt(s) >= 1990 && parseInt(s) <= 2100;
  }
  function isSkipRow(row) {
    if (!row || row.length === 0) return true;
    return row.every(cell => cell === null || cell === undefined || cell.toString().trim() === '');
  }
  function parseColumnsFromHeaders() {
    monthCols = []; yearCols = []; pctColIndices = new Set();
    headers.forEach((h, i) => {
      const s = (h || '').toString().trim();
      if (!s) return;
      if (s === '%')       { pctColIndices.add(i); return; }
      if (isYear(s))         yearCols.push({ label: s, colIndex: i });
      else if (isMonth(s))   monthCols.push({ label: s, colIndex: i });
    });
  }
  function populateFilterDropdowns() {
    ['selMonth1','selMonth2'].forEach((id, idx) => {
      const el = document.getElementById(id);
      el.innerHTML = idx === 0 ? '<option value="">-- Select --</option>' : '<option value="">-- None --</option>';
      monthCols.forEach((m, i) => el.innerHTML += `<option value="${i}">${m.label}</option>`);
    });
    ['selYear1','selYear2'].forEach((id, idx) => {
      const el = document.getElementById(id);
      el.innerHTML = idx === 0 ? '<option value="">-- Select --</option>' : '<option value="">-- None --</option>';
      yearCols.forEach((y, i) => el.innerHTML += `<option value="${i}">${y.label}</option>`);
    });
    if (monthCols.length === 0 && yearCols.length > 0) setFilterType('year');
    else setFilterType('month');
  }
  function setFilterType(type) {
    filterType = type;
    document.getElementById('btnMonth').classList.toggle('active', type === 'month');
    document.getElementById('btnYear').classList.toggle('active',  type === 'year');
    document.getElementById('monthFilters').style.display = type === 'month' ? 'flex' : 'none';
    document.getElementById('yearFilters').style.display  = type === 'year'  ? 'flex' : 'none';
    hideSummary();
  }
  function onFilterChange() {
    const isM  = filterType === 'month';
    const i1   = document.getElementById(isM ? 'selMonth1' : 'selYear1').value;
    const i2   = document.getElementById(isM ? 'selMonth2' : 'selYear2').value;
    const pool = isM ? monthCols : yearCols;
    if (i1 === '') { hideSummary(); return; }
    if (i2 === '') showSingleSummary(pool[i1]);
    else           showCompareSummary(pool[i1], pool[i2]);
  }
  function cellNum(row, ci) {
    if (pctColIndices.has(ci)) return 0;
    const raw = (row[ci] !== undefined && row[ci] !== null) ? row[ci].toString().trim() : '';
    if (!raw) return 0;
    const cleaned = raw.replace(/[^0-9.\-]/g, '');
    if (!cleaned || cleaned === '-') return 0;
    const v = parseFloat(cleaned);
    return isNaN(v) ? 0 : v;
  }
  function calcSummary(colObj) {
    const ci = colObj.colIndex;
    const entries = [];
    allDataRows.forEach((row) => {
      if (isSkipRow(row)) return;
      const v = cellNum(row, ci);
      if (v === 0) return;
      entries.push({ value: v, key: v.toFixed(4) });
    });
    const seen = {};
    let income = 0, expense = 0;
    entries.forEach(e => {
      seen[e.key] = (seen[e.key] || 0) + 1;
      if (seen[e.key] > 1) return;
      if (e.value > 0) income  += e.value;
      else             expense += Math.abs(e.value);
    });
    const net    = income - expense;
    const profit = net >= 0 ? net        : 0;
    const loss   = net <  0 ? Math.abs(net) : 0;
    return { income, expense, profit, loss, net };
  }
  function fmt(n) {
    if (isNaN(n) || n === undefined || n === null) return '0.00';
    return Math.abs(n).toLocaleString('en-PK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function showSingleSummary(colObj) {
    const s  = calcSummary(colObj);
    const sc = document.getElementById('summaryContent');
    const ss = document.getElementById('summarySection');
    let html = `<div class="summary-label"><i class="bi bi-bar-chart-fill"></i> Summary — ${colObj.label}</div>`;
    html += `<div class="cards-grid">`;
    html += card('💰', 'Income / Revenue', fmt(s.income),  `Unique positive values · ${colObj.label}`, 'income');
    html += card('💸', 'Expenses',         fmt(s.expense), `Unique negative values · ${colObj.label}`, 'expense');
    if (s.profit > 0) html += card('📈', 'Profit', fmt(s.profit), 'Income − Expense (net positive)', 'profit');
    if (s.loss   > 0) html += card('📉', 'Loss',   fmt(s.loss),   'Expense − Income (net negative)', 'loss');
    html += `</div>`;
    html += `<div class="formula-hint">💡 <b>Formula:</b> Income = Σ unique +ve &nbsp;|&nbsp; Expense = Σ unique |−ve| &nbsp;|&nbsp; ${s.net >= 0 ? `Profit = ${fmt(s.income)} − ${fmt(s.expense)} = <b>${fmt(s.profit)}</b>` : `Loss = ${fmt(s.expense)} − ${fmt(s.income)} = <b>${fmt(s.loss)}</b>`} &nbsp;· duplicate/subtotal rows auto-skipped</div>`;
    sc.innerHTML = html;
    ss.classList.add('show');
  }
  function card(icon, label, value, sub, type) {
    return `<div class="summary-card ${type}"><div class="card-icon">${icon}</div><div class="card-label">${label}</div><div class="card-value">${value}</div><div class="card-sub">${sub}</div></div>`;
  }
  function miniCard(icon, lbl, val, type) {
    return `<div class="summary-card ${type}" style="padding:10px;"><div class="card-icon" style="font-size:14px;">${icon}</div><div class="card-label" style="font-size:10px;">${lbl}</div><div class="card-value" style="font-size:16px;">${val}</div></div>`;
  }
  function showCompareSummary(col1, col2) {
    const s1 = calcSummary(col1);
    const s2 = calcSummary(col2);
    const sc = document.getElementById('summaryContent');
    const ss = document.getElementById('summarySection');
    function arrow(a, b, good) {
      const d = b - a;
      const pct = a !== 0 ? ((d / Math.abs(a)) * 100).toFixed(1) : null;
      const cls = d === 0 ? 'neutral' : ((d > 0) === good ? 'up' : 'down');
      const sym = d > 0 ? '▲' : d < 0 ? '▼' : '—';
      return `<span class="diff-val ${cls}">${sym} ${pct !== null ? pct + '%' : '—'}</span>`;
    }
    function colBlock(col, s) {
      let h = `<div><div class="compare-col-title">${col.label}</div>`;
      h += `<div class="cards-grid" style="grid-template-columns:1fr 1fr;gap:8px;">`;
      h += miniCard('💰','Income',fmt(s.income),'income');
      h += miniCard('💸','Expense',fmt(s.expense),'expense');
      if (s.profit > 0) h += miniCard('📈','Profit',fmt(s.profit),'profit');
      if (s.loss   > 0) h += miniCard('📉','Loss',fmt(s.loss),'loss');
      h += `</div><div class="formula-hint" style="margin-top:8px;">Net = ${s.net >= 0 ? '+' : ''}${s.net.toLocaleString('en-PK',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>`;
      return h;
    }
    let html = `<div class="summary-label"><i class="bi bi-arrow-left-right"></i> Comparison — ${col1.label} vs ${col2.label}</div>`;
    html += `<div class="compare-grid">${colBlock(col1,s1)}${colBlock(col2,s2)}</div>`;
    html += `<div class="diff-card"><div class="diff-title"><i class="bi bi-graph-up-arrow"></i> Difference (${col2.label} vs ${col1.label})</div>`;
    [{k:'income',icon:'💰',label:'Income',good:true},{k:'expense',icon:'💸',label:'Expense',good:false},{k:'profit',icon:'📈',label:'Profit',good:true},{k:'loss',icon:'📉',label:'Loss',good:false}].forEach(r => {
      if (s1[r.k] > 0 || s2[r.k] > 0) {
        const d = s2[r.k] - s1[r.k];
        html += `<div class="diff-row"><span class="diff-label">${r.icon} ${r.label}</span><span>${fmt(s1[r.k])} → ${fmt(s2[r.k])} &nbsp; ${arrow(s1[r.k],s2[r.k],r.good)} (${d >= 0 ? '+' : '-'}${fmt(Math.abs(d))})</span></div>`;
      }
    });
    html += `</div>`;
    sc.innerHTML = html;
    ss.classList.add('show');
  }
  function hideSummary() {
    document.getElementById('summarySection').classList.remove('show');
    document.getElementById('summaryContent').innerHTML = '';
  }
  function resetFilters() {
    ['selMonth1','selMonth2','selYear1','selYear2'].forEach(id => document.getElementById(id).value = '');
    hideSummary();
  }
  async function loadSheetData() {
    try {
      const token = localStorage.getItem('jwt');
      const res   = await fetch('/getLatestSheetResult', {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
      });
      const text = await res.text();
      if (!res.ok) throw new Error(`Server error: ${res.status} - ${text}`);
      const result = JSON.parse(text);
      const loader = document.getElementById('loader');
      if (!result.success) {
        document.getElementById('tableBody').innerHTML = `<tr><td>${result.error}</td></tr>`;
        loader.style.display = 'none'; return;
      }
      const data = result.data;
      if (!data || data.length === 0) {
        document.getElementById('tableBody').innerHTML = `<tr><td>No data</td></tr>`;
        loader.style.display = 'none'; return;
      }
      infoRows    = data.slice(0, 3);
      headers     = data[3] || [];
      allDataRows = data.slice(4);
      parseColumnsFromHeaders();
      populateFilterDropdowns();
      renderTable();
      document.getElementById('paginationBar').style.display = 'flex';
      loader.style.display = 'none';
    } catch (err) {
      console.error(err);
      document.getElementById('tableBody').innerHTML = `<tr><td>${err.message}</td></tr>`;
      document.getElementById('loader').style.display = 'none';
    }
  }
  function renderTable() {
    const tbody    = document.getElementById('tableBody');
    const colCount = headers.length || 1;
    let html = '';
    infoRows.forEach(row => {
      const text = row.filter(c => c !== '').join(' ');
      html += `<tr class="info-row"><td colspan="${colCount}" style="text-align:left;">${text}</td></tr>`;
    });
    html += `<tr class="header-row">${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
    const start    = (currentPage - 1) * rowsPerPage;
    const end      = start + rowsPerPage;
    const pageRows = allDataRows.slice(start, end);
    if (pageRows.length === 0) {
      html += `<tr><td colspan="${colCount}" style="text-align:center;color:#888;padding:20px;">No data available</td></tr>`;
    } else {
      pageRows.forEach(row => {
        html += '<tr>' + headers.map((_, i) => `<td>${row[i] ?? ''}</td>`).join('') + '</tr>';
      });
    }
    tbody.innerHTML = html;
    renderPagination();
  }
  function renderPagination() {
    const totalPages = Math.max(1, Math.ceil(allDataRows.length / rowsPerPage));
    const start = allDataRows.length === 0 ? 0 : (currentPage - 1) * rowsPerPage + 1;
    const end   = Math.min(currentPage * rowsPerPage, allDataRows.length);
    document.getElementById('paginationInfo').textContent = `Showing ${start}–${end} of ${allDataRows.length} records`;
    const controls = document.getElementById('paginationControls');
    let btns = '';
    btns += `<button class="page-btn" onclick="goToPage(1)" ${currentPage===1?'disabled':''}><i class="bi bi-chevron-double-left"></i></button>`;
    btns += `<button class="page-btn" onclick="goToPage(${currentPage-1})" ${currentPage===1?'disabled':''}><i class="bi bi-chevron-left"></i></button>`;
    let sp = Math.max(1, currentPage-2), ep = Math.min(totalPages, sp+4);
    if (ep-sp < 4) sp = Math.max(1, ep-4);
    for (let p = sp; p <= ep; p++) btns += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goToPage(${p})">${p}</button>`;
    btns += `<button class="page-btn" onclick="goToPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}><i class="bi bi-chevron-right"></i></button>`;
    btns += `<button class="page-btn" onclick="goToPage(${totalPages})" ${currentPage===totalPages?'disabled':''}><i class="bi bi-chevron-double-right"></i></button>`;
    controls.innerHTML = btns;
  }
  function goToPage(page) {
    const totalPages = Math.ceil(allDataRows.length / rowsPerPage);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderTable();
    document.querySelector('.table-responsive').scrollTop = 0;
  }
  function changeRowsPerPage() {
    rowsPerPage = parseInt(document.getElementById('rowsPerPage').value);
    currentPage = 1;
    renderTable();
  }
  window.onload = loadSheetData;
</script>
</body>
</html>
