<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Sheet Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #eef2f7, #f8fafc);
      font-family: 'Segoe UI', sans-serif;
    }
    .card-box {
      background: #fff;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      position: relative;
    }
    h4 {
      font-weight: 600;
      color: #2c3e50;
    }
    .table-responsive {
      max-height: 70vh;
      overflow-y: auto;
    }
    table {
      border-radius: 10px;
      overflow: hidden;
    }
    thead th {
      position: sticky;
      top: 0;
      background: linear-gradient(135deg, #0d6efd, #0b5ed7);
      color: #fff;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      z-index: 2;
      text-align: center;
    }
    tbody tr:nth-child(even) {
      background: #f9fbfd;
    }
    tbody tr {
      transition: all 0.2s ease;
    }
    tbody tr:hover {
      background: #e7f1ff;
      transform: scale(1.002);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    td, th {
      padding: 10px !important;
      font-size: 13px;
      white-space: nowrap;
      text-align: center;
    }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .badge-status {
      background: #e7f1ff;
      color: #0d6efd;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
    }
    .loader-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      z-index: 10;
    }
    .loader { text-align: center; }
    .spinner-border { width: 3rem; height: 3rem; }
    .loader-text { margin-top: 10px; font-size: 14px; color: #555; }

    /* Pagination */
    .pagination-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      padding: 10px 14px;
      background: #f1f5ff;
      border-radius: 10px;
      border: 1px solid #d0e0ff;
    }
    .pagination-info {
      font-size: 12px;
      color: #555;
    }
    .pagination-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .page-btn {
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      border-radius: 7px;
      border: 1px solid #b0c8ff;
      background: #fff;
      color: #0d6efd;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .page-btn:hover { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    .page-btn.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .rows-select {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 7px;
      border: 1px solid #b0c8ff;
      background: #fff;
      color: #2c3e50;
      cursor: pointer;
    }

    tbody tr.info-row td {
      font-weight: 600;
      background: #f1f5ff;
      text-align: left;
      color: #2c3e50;
      font-size: 14px;
    }
    tbody tr.info-row:nth-child(1) td {
      font-size: 16px;
      color: #0d6efd;
    }
    tbody tr.header-row th {
      background: linear-gradient(135deg, #0d6efd, #0b5ed7);
      color: #fff;
    }

    @media (max-width: 768px) {
      .table-responsive { max-height: 60vh; }
    }
  </style>
</head>
<body>

<div class="container mt-4">
  <div class="card-box">

    <div id="loader" class="loader-wrapper">
      <div class="loader">
        <div class="spinner-border text-primary" role="status"></div>
        <div class="loader-text">Loading data...</div>
      </div>
    </div>

    <div class="header-bar">
      <h4><i class="bi bi-bar-chart-line"></i> Google Sheet Result</h4>
      <span class="badge-status">Live Data</span>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle" id="sheetTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- PAGINATION BAR -->
    <div class="pagination-bar" id="paginationBar" style="display:none;">
      <div class="d-flex align-items-center gap-2">
        <span class="pagination-info">Rows per page:</span>
        <select class="rows-select" id="rowsPerPage" onchange="changeRowsPerPage()">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>
      <span class="pagination-info" id="paginationInfo"></span>
      <div class="pagination-controls" id="paginationControls"></div>
    </div>

  </div>
</div>

<script>
let allDataRows = [];
let headers = [];
let infoRows = [];
let currentPage = 1;
let rowsPerPage = 25;

async function loadSheetData() {
  try {
    // JWT token localStorage se uthao
    const token = localStorage.getItem('jwt'); // ya jahan store hai

    const res = await fetch('/getLatestSheetResult', {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`,  // Fastify JWT decorator ke liye
        'Content-Type': 'application/json'
      }
    });

    const result = await res.json();
    const loader = document.getElementById('loader');

    if (!result.success) {
      document.getElementById('tableBody').innerHTML = `<tr><td>${result.error}</td></tr>`;
      loader.style.display = "none";
      return;
    }

    const data = result.data;
    if (!data || data.length === 0) {
      document.getElementById('tableBody').innerHTML = `<tr><td>No data</td></tr>`;
      loader.style.display = "none";
      return;
    }

    infoRows = data.slice(0, 3);
    headers = data[3] || [];
    allDataRows = data.slice(4);

    renderTable();
    document.getElementById('paginationBar').style.display = 'flex';
    loader.style.display = "none";

  } catch (err) {
    console.error(err);
    document.getElementById('tableBody').innerHTML = `<tr><td>${err.message}</td></tr>`;
    document.getElementById('loader').style.display = "none";
  }
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const colCount = headers.length || 1;
  let html = '';

  infoRows.forEach(row => {
    const text = row.filter(c => c !== '').join(' ');
    html += `<tr class="info-row"><td colspan="${colCount}" style="text-align:left;">${text}</td></tr>`;
  });

  html += `<tr class="header-row">${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;

  const start = (currentPage - 1) * rowsPerPage;
  const end = start + rowsPerPage;
  const pageRows = allDataRows.slice(start, end);

  if (pageRows.length === 0) {
    html += `<tr><td colspan="${colCount}" style="text-align:center;color:#888;padding:20px;">No data available</td></tr>`;
  } else {
    pageRows.forEach(row => {
      html += '<tr>' + headers.map((_, i) => `<td>${row[i] ?? ''}</td>`).join('') + '</tr>';
    });
  }

  tbody.innerHTML = html;
  renderPagination();
}

function renderPagination() {
  const totalPages = Math.max(1, Math.ceil(allDataRows.length / rowsPerPage));
  const start = allDataRows.length === 0 ? 0 : (currentPage - 1) * rowsPerPage + 1;
  const end = Math.min(currentPage * rowsPerPage, allDataRows.length);

  document.getElementById('paginationInfo').textContent =
    `Showing ${start}–${end} of ${allDataRows.length} records`;

  const controls = document.getElementById('paginationControls');
  let btns = '';

  btns += `<button class="page-btn" onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}><i class="bi bi-chevron-double-left"></i></button>`;
  btns += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="bi bi-chevron-left"></i></button>`;

  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, startPage + 4);
  if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

  for (let p = startPage; p <= endPage; p++) {
    btns += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
  }

  btns += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="bi bi-chevron-right"></i></button>`;
  btns += `<button class="page-btn" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}><i class="bi bi-chevron-double-right"></i></button>`;

  controls.innerHTML = btns;
}

function goToPage(page) {
  const totalPages = Math.ceil(allDataRows.length / rowsPerPage);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderTable();
  document.querySelector('.table-responsive').scrollTop = 0;
}

function changeRowsPerPage() {
  rowsPerPage = parseInt(document.getElementById('rowsPerPage').value);
  currentPage = 1;
  renderTable();
}

window.onload = loadSheetData;
</script>

</body>
</html>
