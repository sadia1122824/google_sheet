        .empty-state { text-align: center; color: #6c757d; padding: 2rem; font-style: italic; }

        .menu-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #9aa4b2; font-weight: 600; margin: 18px 16px 8px; }

<body>

        <!-- Contenido de la Página -->
        <div class="page-content">

                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">

                                <p class="text-muted mb-0">Sube un archivo Excel para importar datos directamente</p>

                            <div class="card">

                                                </div>

                                                <!-- ID de Personal -->

                                                    <div class="form-group">

    <script src="../admin/side_navbar.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function () {

        const hamburgerBtn = document.querySelector('.button-menu-mobile');
        if (hamburgerBtn) {
            hamburgerBtn.addEventListener('click', function () {
                const isMobile = window.innerWidth <= 767;
                if (isMobile) {
                    document.body.classList.toggle('mobile-menu-open');
                } else {
                    document.body.classList.toggle('enlarge-menu');
                }
            });
        }

        document.addEventListener('click', function (e) {
            if (window.innerWidth > 767) return;
            const sidebar = document.querySelector('.left-sidenav');
            const hamburger = document.querySelector('.button-menu-mobile');
            if (sidebar && hamburger &&
                !sidebar.contains(e.target) &&
                !hamburger.contains(e.target)
            ) {
                document.body.classList.remove('mobile-menu-open');
            }
        });

        function showAlert(type, message) {
            const alertBox = document.getElementById("staffAlert");
            if (!alertBox) return;
            alertBox.className = `alert alert-${type}`;
            alertBox.innerText = message;
            alertBox.style.display = "block";
            if (type === "success") {
                setTimeout(() => { alertBox.style.display = "none"; }, 4000);
            }
        }

        function getErrorMessage(status, serverMessage) {
            if (serverMessage) return serverMessage;
            switch (status) {
                case 400: return "Entrada inválida. Por favor verifique todos los campos e intente de nuevo.";
                case 401: return "No está autorizado. Por favor inicie sesión de nuevo.";
                case 403: return "Acceso denegado. No tiene permiso para realizar esta acción.";
                case 404: return "El recurso solicitado no fue encontrado.";
                case 409: return "Ya existe un miembro del personal con este ID o correo electrónico.";
                case 422: return "Algunos campos tienen valores inválidos. Por favor revise el formulario.";
                case 429: return "Demasiadas solicitudes. Por favor espere un momento e intente de nuevo.";
                case 500: return "Error interno del servidor. Por favor intente más tarde.";
                case 503: return "El servicio no está disponible temporalmente. Por favor intente en breve.";
                default:  return `Error inesperado (${status}). Por favor intente de nuevo.`;
            }
        }

        function validateStaffForm(data) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const phoneRegex = /^[0-9]{10,15}$/;

            if (!data.fullName.trim())
                return "El nombre completo es obligatorio.";
            if (!emailRegex.test(data.email))
                return "Por favor ingrese una dirección de correo electrónico válida.";
            if (data.password.length < 6)
                return "La contraseña debe tener al menos 6 caracteres.";
            if (!phoneRegex.test(data.phone))
                return "Por favor ingrese un número de teléfono válido (10–15 dígitos).";
            if (!data.staffId.trim())
                return "El ID de personal es obligatorio.";
            if (!data.role)
                return "Por favor seleccione un rol para el miembro del personal.";

            return null;
        }

        document.getElementById("staffForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const submitBtn = this.querySelector('button[type="submit"]');

            const staffData = {
                fullName: document.getElementById("staffName").value.trim(),
                email: document.getElementById("staffEmail").value.trim(),
                password: document.getElementById("staffPassword").value,
                phone: document.getElementById("staffPhone").value.trim(),
                staffId: document.getElementById("staffId").value.trim(),
                role: document.getElementById("staffRole").value
            };

            const validationError = validateStaffForm(staffData);
            if (validationError) {
                showAlert("danger", validationError);
                return;
            }

            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.innerText = "Guardando...";
            }

            try {
                const response = await fetch("/staffRecord", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(staffData)
                });

                let result = {};
                try {
                    result = await response.json();
                } catch {
                    throw new Error("Respuesta inválida del servidor. Por favor intente de nuevo.");
                }

                if (response.ok) {
                    showAlert("success", result.message || "¡Miembro del personal agregado exitosamente!");
                    document.getElementById("staffForm").reset();
                } else {
                    const errorMessage = getErrorMessage(response.status, result.message);
                    showAlert("danger", errorMessage);
                }

            } catch (error) {
                if (error.message === "Failed to fetch") {
                    showAlert("danger", "Error de red. Por favor verifique su conexión a internet e intente de nuevo.");
                } else {
                    showAlert("danger", error.message || "Algo salió mal. Por favor intente de nuevo.");
                }
                console.error("Staff form error:", error);

            } finally {
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Guardar";
                }
            }
        });

    });
    </script>

</body>
