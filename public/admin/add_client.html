            body.mobile-menu-open .left-sidenav {

            .nav-user span {
                display: none !important;
            }

                transform: translateX(0);
            }

            .left-sidenav {
                position: fixed;
                z-index: 1051;
                transform: translateX(-100%);

        #addForm button:hover {

        /* Lista de filas existentes */
        #rowsList {
            list-style: none;

        #rowsList li {

        /* Encabezados */

        }

        .total-display {

        /* Mensajes de alerta */

            margin-bottom: 0.5rem;

        }

            border-radius: 0.25rem;

        }

        .loading {

            width: 16px;
            height: 16px;

        @keyframes slideInRight {
            from {
                transform: translateX(100%);

            to {

        /* Estilos de Alerta */
        .alert {

        @keyframes fadeIn {
            from {

                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Estilos de Lista de Entradas */
        .entries-list {
            max-height: 300px;

            margin-bottom: 1.5rem;
        }

        .entry-item {

        .month-badge {

            padding: 0.25rem 0.5rem;

            font-size: 0.75rem;

        }

        .empty-state {
            text-align: center;

            padding: 2rem;

        }

        .total-display {
            background-color: #007bff;

            float: right;

        /* Enlaces de la barra lateral */
        .left-sidenav-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 10px;

            font-size: 14px;

        /* Efecto al pasar el cursor */
        .left-sidenav-menu a:hover {

        /* Enlace activo */
        .left-sidenav-menu a.active {

        /* Estilo de iconos */
        .left-sidenav-menu .menu-icon {
            width: 18px;
            height: 18px;

            transition: all 0.25s ease;
        }

        /* Animación de icono al pasar cursor */
        .left-sidenav-menu a:hover .menu-icon {
            transform: scale(1.1);
        }

        /* Indicador de borde izquierdo moderno */
        .left-sidenav-menu a::before {
            content: "";
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: #2563eb;
            border-radius: 10px;
            transition: all 0.25s ease;
        }

        .left-sidenav-menu a:hover::before,
        .left-sidenav-menu a.active::before {

        }

        /* Etiqueta del menú */
        .menu-label {

            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9aa4b2;
            font-weight: 600;

    <script>
        document.addEventListener("DOMContentLoaded", async function () {

            const hamburgerBtn = document.querySelector('.button-menu-mobile');

            if (hamburgerBtn) {
                hamburgerBtn.addEventListener('click', function () {
                    const isMobile = window.innerWidth <= 767;

                    if (isMobile) {
                        document.body.classList.toggle('mobile-menu-open');
                    } else {
                        document.body.classList.toggle('enlarge-menu');
                    }
                });
            }

            // Cerrar barra lateral al hacer clic fuera en móvil
            document.addEventListener('click', function (e) {
                if (window.innerWidth > 767) return;

                const sidebar = document.querySelector('.left-sidenav');
                const hamburger = document.querySelector('.button-menu-mobile');

                if (sidebar && hamburger &&
                    !sidebar.contains(e.target) &&
                    !hamburger.contains(e.target)
                ) {
                    document.body.classList.remove('mobile-menu-open');
                }
            });



            // =========================
            // 1. CARGAR DESPLEGABLE DE PERSONAL
            // =========================
            async function loadStaffDropdown() {

                try {

                    const response = await fetch("/getStaff");
                    const result = await response.json();

                    const select = document.getElementById("assignStaff");

                    select.innerHTML = `<option value="">Seleccionar Miembro del Personal</option>`;

                    if (result.success && result.data.length > 0) {

                        result.data.forEach(staff => {

                            const option = document.createElement("option");
                            option.value = staff.fullName;
                            option.textContent = `${staff.fullName}`;

                            select.appendChild(option);
                        });
                    }

                } catch (error) {
                    console.log("Error al cargar personal:", error);
                }
            }

            loadStaffDropdown();


            // =========================
            // 2. ENVÍO DEL FORMULARIO DE CLIENTE
            // =========================
            document.getElementById("clientForm").addEventListener("submit", async function (e) {
                e.preventDefault();

                const clientData = {
                    fullName: document.getElementById("clientName").value,
                    email: document.getElementById("clientEmail").value,
                    password: document.getElementById("clientPassword").value,
                    phone: document.getElementById("clientPhone").value,
                    clientId: document.getElementById("clientId").value,
                    assignStaff: document.getElementById("assignStaff").value
                };

                try {

                    const response = await fetch("/AddClients", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(clientData)
                    });

                    const result = await response.json();

                    const alertBox = document.getElementById("clientAlert");

                    alertBox.style.display = "block";

                    if (response.ok) {
                        alertBox.className = "alert alert-success";
                        alertBox.innerText = result.message;

                        document.getElementById("clientForm").reset();
                    } else {
                        alertBox.className = "alert alert-danger";
                        alertBox.innerText = result.message;
                    }

                } catch (error) {
                    console.log(error);
                }
            });



        });
    </script>

</body>

</html>
