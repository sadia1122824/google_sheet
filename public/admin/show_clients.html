        // =========================
        // LOAD CLIENTS
        // =========================
        async function loadClients() {

            try {

                const response = await fetch("/getClients");

                const result = await response.json();

                const tableBody = document.getElementById("clientTableBody");

                tableBody.innerHTML = "";

                // No Data
                if (!result.data || result.data.length === 0) {

                    tableBody.innerHTML = `
                <tr>
                    <td colspan="8" class="text-center text-danger">
                        No Clients Found
                    </td>
                </tr>
            `;

                    console.log("No Clients Found");

                    return;
                }

                // Loop Clients
                result.data.forEach((client, index) => {

                    tableBody.innerHTML += `

                <tr>

                    <td>${index + 1}</td>

                    <td>${client.fullName}</td>

                    <td>${client.email}</td>

                    <td>${client.phone}</td>

                    <td>${client.clientId}</td>

                    <td>
                        <span class="badge badge-primary">
                            ${client.assignStaff}
                        </span>
                    </td>

                    <td>
                        ${new Date(client.createdAt).toLocaleDateString()}
                    </td>

                    <td>

                        <button 
                          class="btn btn-warning btn-sm mr-1"
                           onclick="openUpdateClientModal('${client._id}', '${client.fullName}', '${client.email}', '${client.phone}', '${client.clientId}', '${client.assignStaff}')"
                      >
                           <i class="fas fa-edit"></i> 
                        </button>

                        <button 
                            class="btn btn-danger btn-sm"
                            onclick="deleteClient('${client._id}')"
                        >
                            <i class="fas fa-trash"></i>
                            
                        </button>

                    </td>

                </tr>
            `;
                });

                console.log("Clients Loaded Successfully");

            } catch (error) {

                console.log("Load Clients Error:", error);
            }
        }

        // =========================
        // DELETE CLIENT
        // =========================
        async function deleteClient(id) {



            try {

                const response = await fetch(`/deleteClient/${id}`, {
                    method: "DELETE"
                });

                const result = await response.json();

                console.log(result.message);

                loadClients();

            } catch (error) {

                console.log("Delete Failed:", error);
            }
        }


        // Modal Open
        function openUpdateClientModal(id, fullName, email, phone, clientId, assignStaff) {

            document.getElementById('updateClientId').value = id;
            document.getElementById('updateClientFullName').value = fullName;
            document.getElementById('updateClientEmail').value = email;
            document.getElementById('updateClientPhone').value = phone;
            document.getElementById('updateClientIdField').value = clientId;
            document.getElementById('updateAssignStaff').value = assignStaff;

            document.getElementById('updateClientModal').style.display = 'block';

            console.log("Update Modal Opened");
        }

        // Modal Close
        function closeUpdateClientModal() {

            document.getElementById('updateClientModal').style.display = 'none';

            document.getElementById('updateClientPassword').value = '';

            document.getElementById('updateClientPassword').type = 'password';

            document.getElementById('clientPasswordEyeIcon')
                .classList.replace('fa-eye-slash', 'fa-eye');

            console.log("Update Modal Closed");
        }

        // Background click se close
        document.getElementById('updateClientModal')
            .addEventListener('click', function (e) {

                if (e.target === this) {

                    closeUpdateClientModal();
                }
            });

        // Password Toggle
        function toggleClientPasswordVisibility() {

            const input = document.getElementById('updateClientPassword');

            const icon = document.getElementById('clientPasswordEyeIcon');

            if (input.type === 'password') {

                input.type = 'text';

                icon.classList.replace('fa-eye', 'fa-eye-slash');

                console.log("Password Visible");

            } else {

                input.type = 'password';

                icon.classList.replace('fa-eye-slash', 'fa-eye');

                console.log("Password Hidden");
            }
        }

        // Submit Update
        async function submitClientUpdate() {

            const id = document.getElementById('updateClientId').value;

            const fullName = document.getElementById('updateClientFullName').value.trim();

            const email = document.getElementById('updateClientEmail').value.trim();

            const phone = document.getElementById('updateClientPhone').value.trim();

            const clientId = document.getElementById('updateClientIdField').value.trim();

            const assignStaff = document.getElementById('updateAssignStaff').value.trim();

            const password = document.getElementById('updateClientPassword').value.trim();

            if (!fullName || !email || !phone || !clientId) {

                console.log("Please fill all required fields");

                return;
            }

            const btn = document.getElementById('updateClientBtn');

            btn.disabled = true;

            btn.innerHTML = '<span class="loading"></span> Saving...';

            const payload = {
                fullName,
                email,
                phone,
                clientId,
                assignStaff
            };

            if (password !== "") {

                payload.password = password;
            }

            try {

                const response = await fetch(`/updateClient/${id}`, {

                    method: "PUT",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                console.log(result.message || "Updated Successfully");

                closeUpdateClientModal();

                loadClients();

            } catch (error) {

                console.log("Update Failed:", error);

            } finally {

                btn.disabled = false;

                btn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
            }
        }

        // =========================
        // AUTO LOAD
        // =========================
        loadClients();

        const hamburgerBtn = document.querySelector('.button-menu-mobile');

        if (hamburgerBtn) {
            hamburgerBtn.addEventListener('click', function () {
                const isMobile = window.innerWidth <= 767;

                if (isMobile) {
                    document.body.classList.toggle('mobile-menu-open');
                } else {
                    document.body.classList.toggle('enlarge-menu');
                }
            });
        }

        // Mobile par bahar click se sidebar band
        document.addEventListener('click', function (e) {
            if (window.innerWidth > 767) return;

            const sidebar = document.querySelector('.left-sidenav');
            const hamburger = document.querySelector('.button-menu-mobile');

            if (sidebar && hamburger &&
                !sidebar.contains(e.target) &&
                !hamburger.contains(e.target)
            ) {
                document.body.classList.remove('mobile-menu-open');
            }
        });



    </script>

</body>

</html>
